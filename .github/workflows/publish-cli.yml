name: Publish @easl/cli

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - "cli@*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm --filter @easl/cli publish --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: true

      - run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  binaries:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#cli@}" >> "$GITHUB_OUTPUT"

      - name: Build binaries for all platforms
        working-directory: packages/cli
        run: bun run scripts/build-binaries.mjs
        env:
          CLI_VERSION: ${{ steps.version.outputs.version }}

      - name: Upload release assets
        working-directory: packages/cli/dist/bin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            easl-darwin-arm64.tar.gz \
            easl-darwin-x64.tar.gz \
            easl-linux-x64.tar.gz \
            easl-linux-arm64.tar.gz \
            --clobber
