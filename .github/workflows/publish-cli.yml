name: Publish @easl/cli

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - "cli@*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#cli@}" >> "$GITHUB_OUTPUT"

      - name: Build linux binaries
        working-directory: packages/cli
        run: bun run scripts/build-binaries.mjs
        env:
          CLI_VERSION: ${{ steps.version.outputs.version }}
          BUILD_TARGETS: linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: packages/cli/dist/bin/easl-linux-*.tar.gz
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#cli@}" >> "$GITHUB_OUTPUT"

      # Running bun on macOS makes bun auto-apply ad-hoc Mach-O signatures to
      # the compiled darwin binaries. Cross-compiling from Linux skips signing,
      # which causes macOS to SIGKILL unsigned arm64 binaries on launch.
      - name: Build darwin binaries
        working-directory: packages/cli
        run: bun run scripts/build-binaries.mjs
        env:
          CLI_VERSION: ${{ steps.version.outputs.version }}
          BUILD_TARGETS: darwin

      - name: Verify darwin binaries are signed
        working-directory: packages/cli
        run: |
          for bin in dist/bin/easl-darwin-arm64 dist/bin/easl-darwin-x64; do
            codesign --verify --verbose "$bin"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: packages/cli/dist/bin/easl-darwin-*.tar.gz
          if-no-files-found: error

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: actions/download-artifact@v4
        with:
          path: packages/cli/dist/bin
          merge-multiple: true

      - name: Publish to npm
        run: pnpm --filter @easl/cli publish --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Create GitHub Release with binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            packages/cli/dist/bin/easl-darwin-arm64.tar.gz
            packages/cli/dist/bin/easl-darwin-x64.tar.gz
            packages/cli/dist/bin/easl-linux-x64.tar.gz
            packages/cli/dist/bin/easl-linux-arm64.tar.gz
          fail_on_unmatched_files: true
