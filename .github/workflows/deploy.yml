name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-${{ github.event.pull_request.number || 'prod' }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    name: CI
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm build

      - run: pnpm test

  deploy-production:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Deploy to production
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Migrate D1
        working-directory: packages/worker
        run: pnpm wrangler d1 execute easl-db --file=./schema.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker
        working-directory: packages/worker
        run: pnpm wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-preview:
    needs: ci
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Deploy preview
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Deploy preview worker
        id: preview
        working-directory: packages/worker
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          PREVIEW_NAME="easl-preview-${PR_NUM}"
          PREVIEW_HOST="preview-pr-${PR_NUM}.easl.dev"
          PREVIEW_DB="easl-db-preview-${PR_NUM}"
          PREVIEW_KV="easl-kv-preview-${PR_NUM}"

          # Create per-PR D1 database (idempotent — may already exist)
          pnpm wrangler d1 create "$PREVIEW_DB" 2>&1 || true
          DB_ID=$(pnpm wrangler d1 list --json | jq -r ".[] | select(.name == \"$PREVIEW_DB\") | .uuid")
          if [ -z "$DB_ID" ]; then echo "ERROR: Failed to get D1 database ID for $PREVIEW_DB"; exit 1; fi

          # Create per-PR KV namespace (idempotent — may already exist)
          pnpm wrangler kv namespace create "$PREVIEW_KV" 2>&1 || true
          KV_ID=$(pnpm wrangler kv namespace list --json | jq -r ".[] | select(.title == \"$PREVIEW_KV\") | .id")
          if [ -z "$KV_ID" ]; then echo "ERROR: Failed to get KV namespace ID for $PREVIEW_KV"; exit 1; fi

          # Copy wrangler config, strip routes, enable workers.dev for preview
          sed '/^\[\[routes\]\]/,/^$/d' wrangler.toml > wrangler.preview.toml
          sed -i "s/^name = .*/name = \"$PREVIEW_NAME\"/" wrangler.preview.toml
          sed -i "s/^workers_dev = .*/workers_dev = true/" wrangler.preview.toml
          sed -i "s/^preview_urls = .*/preview_urls = false/" wrangler.preview.toml

          # Swap D1 + KV bindings to per-PR resources
          sed -i "s/database_id = .*/database_id = \"$DB_ID\"/" wrangler.preview.toml
          sed -i "s/database_name = .*/database_name = \"$PREVIEW_DB\"/" wrangler.preview.toml
          sed -i "s/id = \"00c6d65754594b07bdbbc4265585aa77\"/id = \"$KV_ID\"/" wrangler.preview.toml

          # Migrate preview D1
          pnpm wrangler d1 execute "$PREVIEW_DB" --file=./schema.sql --remote

          pnpm wrangler deploy --config wrangler.preview.toml

          PREVIEW_URL="https://${PREVIEW_HOST}"
          echo "url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v8
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            const body = [
              '### Deploy Preview',
              '',
              url,
              '',
              `_Updated at ${new Date().toISOString()}_`,
            ].join('\n');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('### Deploy Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Cleanup preview
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Delete preview worker
        working-directory: packages/worker
        run: pnpm wrangler delete --name "easl-preview-${{ github.event.pull_request.number }}" --force
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Cleanup preview resources
        working-directory: packages/worker
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          PREVIEW_DB="easl-db-preview-${PR_NUM}"
          PREVIEW_KV="easl-kv-preview-${PR_NUM}"

          # Extract R2 keys and slugs from preview D1 before deleting it
          SLUGS=$(pnpm wrangler d1 execute "$PREVIEW_DB" --json --remote \
            --command="SELECT slug FROM sites" | jq -r '.[].results[].slug') || true

          R2_KEYS=$(pnpm wrangler d1 execute "$PREVIEW_DB" --json --remote \
            --command="SELECT files_json FROM versions" | jq -r '.[].results[].files_json' | jq -r '.[].r2Key') || true

          # Delete R2 file objects (keyed by slug/versionId/path — unique per D1)
          for key in $R2_KEYS; do
            pnpm wrangler r2 object delete "easl-content/$key" || true
          done
          # Note: og/{slug}.png and qr/{slug}.svg are NOT deleted here because
          # preview slugs could theoretically collide with prod slugs (slug
          # uniqueness is per-D1). The orphan cost is negligible.

          # Delete per-PR KV namespace
          KV_ID=$(pnpm wrangler kv namespace list --json | jq -r ".[] | select(.title == \"$PREVIEW_KV\") | .id") || true
          if [ -n "$KV_ID" ]; then
            pnpm wrangler kv namespace delete --namespace-id="$KV_ID" -y || true
          fi

          # Delete per-PR D1 database
          pnpm wrangler d1 delete "$PREVIEW_DB" -y || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
