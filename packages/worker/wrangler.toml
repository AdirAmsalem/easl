# easl — Agent-native hosting with beautiful auto-rendering
name = "easl"
main = "src/index.ts"
compatibility_date = "2026-02-21"
compatibility_flags = ["nodejs_compat"]

# Uncomment when deploying:
# [[routes]]
# pattern = "api.easl.dev/*"
# zone_name = "easl.dev"
#
# [[routes]]
# pattern = "*.easl.dev/*"
# zone_name = "easl.dev"
#
# [[routes]]
# pattern = "easl.dev/*"
# zone_name = "easl.dev"

[[kv_namespaces]]
binding = "SITES_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
# Local dev uses .wrangler/state — no remote ID needed

[[r2_buckets]]
binding = "CONTENT"
bucket_name = "easl-content"

[[d1_databases]]
binding = "DB"
database_name = "easl-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[vars]
DOMAIN = "easl.dev"
API_HOST = "api.easl.dev"

# Secrets (set via `wrangler secret put <NAME>`):
# R2_ACCESS_KEY_ID
# R2_SECRET_ACCESS_KEY
# R2_ACCOUNT_ID
