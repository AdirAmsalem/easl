# easl — Agent-native hosting with beautiful auto-rendering
name = "easl"
main = "src/index.ts"
compatibility_date = "2026-02-21"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

[assets]
directory = "./public"

[[routes]]
pattern = "easl.dev/*"
zone_name = "easl.dev"

[[routes]]
pattern = "api.easl.dev/*"
zone_name = "easl.dev"

[[routes]]
pattern = "*.easl.dev/*"
zone_name = "easl.dev"

[[kv_namespaces]]
binding = "SITES_KV"
id = "00c6d65754594b07bdbbc4265585aa77"
# Local dev uses .wrangler/state — no remote ID needed

[[r2_buckets]]
binding = "CONTENT"
bucket_name = "easl-content"

[[d1_databases]]
binding = "DB"
database_name = "easl-db"
database_id = "8b7c3c46-7517-4459-a024-7d22ca39e28d"

[vars]
DOMAIN = "easl.dev"
API_HOST = "api.easl.dev"
WORKERS_DEV_SUBDOMAIN = "adir"

# Secrets (set via `wrangler secret put <NAME>`):
# R2_ACCESS_KEY_ID
# R2_SECRET_ACCESS_KEY
# R2_ACCOUNT_ID
