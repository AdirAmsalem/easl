# easl — Agent-native hosting with beautiful auto-rendering
name = "easl"
main = "src/index.ts"
compatibility_date = "2026-02-21"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

[assets]
directory = "./public"

[[routes]]
pattern = "easl.dev/*"
zone_name = "easl.dev"

[[routes]]
pattern = "api.easl.dev/*"
zone_name = "easl.dev"

[[routes]]
pattern = "*.easl.dev/*"
zone_name = "easl.dev"

[[kv_namespaces]]
binding = "SITES_KV"
id = "00c6d65754594b07bdbbc4265585aa77"  # Self-hosters: replace with your own KV namespace ID

[[r2_buckets]]
binding = "CONTENT"
bucket_name = "easl-content"

[[d1_databases]]
binding = "DB"
database_name = "easl-db"
database_id = "8b7c3c46-7517-4459-a024-7d22ca39e28d"  # Self-hosters: replace with your own D1 database ID
migrations_dir = "migrations"  # applied via `wrangler d1 migrations apply`

[vars]
DOMAIN = "easl.dev"
API_HOST = "api.easl.dev"
WORKERS_DEV_SUBDOMAIN = "adir"  # Cloudflare account subdomain for preview proxy
# SESSION_SECRET signs unlock cookies for private easls. It is intentionally NOT defined
# here — committing it to [vars] would deploy a publicly-known key, letting anyone forge
# unlock cookies. Set it as a secret in production:
#   wrangler secret put SESSION_SECRET   (use a strong random value, e.g. `openssl rand -base64 48`)
# For local dev, put it in .dev.vars (gitignored; see .dev.vars.example).
# If it is unset or left as the placeholder, the Worker fails closed on private sites.

[observability]
enabled = true
head_sampling_rate = 1
